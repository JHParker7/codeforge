apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gatekeeper.fullname" . }}
  labels:
    {{- include "gatekeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: gatekeeper
spec:
  replicas: {{ .Values.gatekeeper.replicaCount }}
  selector:
    matchLabels:
      {{- include "gatekeeper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gatekeeper
  template:
    metadata:
      labels:
        {{- include "gatekeeper.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gatekeeper
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "gatekeeper.fullname" . }}-db {{ .Values.database.port }}; do
                echo "waiting for database..."; sleep 2;
              done
      containers:
        - name: gatekeeper
          image: "{{ .Values.gatekeeper.image.repository }}:{{ .Values.gatekeeper.image.tag }}"
          imagePullPolicy: {{ .Values.gatekeeper.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gatekeeper.port }}
              protocol: TCP
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.database.existingSecret }}{{ .Values.database.existingSecret }}{{ else }}{{ include "gatekeeper.fullname" . }}-db{{ end }}
                  key: {{ .Values.database.existingSecretKey }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.database.user }}:$(DB_PASSWORD)@{{ include "gatekeeper.fullname" . }}-db:{{ .Values.database.port }}"
          readinessProbe:
            httpGet:
              path: /token
              port: http
              httpHeaders:
                - name: Host
                  value: "127.0.0.1:8081"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /token
              port: http
              httpHeaders:
                - name: Host
                  value: "127.0.0.1:8081"
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gatekeeper.resources | nindent 12 }}
