gatekeeper:
  image:
    repository: gatekeeper
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

database:
  image:
    repository: public.ecr.aws/docker/library/postgres
    tag: 14.21-alpine3.23
    pullPolicy: IfNotPresent
  port: 5432
  name: codeforge
  user: postgres
  # password is set via existingSecret or password field
  # For production, use existingSecret
  password: ""
  existingSecret: ""
  existingSecretKey: postgres-password
  storage: 10Gi
  storageClassName: ""
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

service:
  type: LoadBalancer
  port: 80
  # loadBalancerIP: ""
  # annotations: {}
